<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루틴 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
<style>
  :root {
    --primary: #4052b6;
    --primary-dim: #3346a9;
    --ink: #2c2f33;
    --ink-2: #595b61;
    --ink-light: #abadb3;
    --surface: #ffffff;
    --surface-low: #eff0f7;
    --surface-container: #e6e8ef;
    --border: #e6e8ef;
    --error: #b41340;
  }

  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    vertical-align: middle;
    line-height: 1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: linear-gradient(135deg, #f5f6fc 0%, #eef0ff 100%);
    background-attachment: fixed;
    font-family: 'Gowun Dodum', 'Inter', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 96px 20px 100px;
    max-width: 900px;
    margin: 0 auto;
  }

  /* ── GLASS NAV ────────────────────────────────────────────── */
  .glass-nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    background: rgba(245, 246, 252, 0.78);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(230, 232, 239, 0.7);
    box-shadow: 0 4px 24px rgba(64, 82, 182, 0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 28px;
    height: 68px;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Manrope', sans-serif;
    font-size: 19px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--primary);
    text-decoration: none;
  }

  .nav-brand-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dim));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: 0 4px 12px rgba(64, 82, 182, 0.3);
    flex-shrink: 0;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── HEADER (월 네비게이션) ───────────────────────────────── */
  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }

  .month-nav { display: flex; align-items: center; gap: 16px; }

  .month-title {
    font-family: 'Manrope', sans-serif;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.8px;
    color: var(--ink);
  }

  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    width: 38px; height: 38px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--primary);
    transition: all 0.18s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .nav-btn:hover {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
    box-shadow: 0 4px 14px rgba(64, 82, 182, 0.3);
    transform: scale(1.05);
  }

  .today-btn {
    background: var(--surface);
    color: var(--primary);
    border: 1.5px solid var(--border);
    padding: 7px 20px;
    border-radius: 99px;
    font-family: 'Manrope', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .today-btn:hover {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
    box-shadow: 0 4px 14px rgba(64, 82, 182, 0.25);
  }

  /* ── LEGEND ──────────────────────────────────────────────── */
  .legend { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }

  .legend-item {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(8px);
    border: 1.5px solid var(--border);
    border-radius: 99px;
    padding: 5px 12px 5px 7px;
    cursor: pointer;
    transition: all 0.18s;
    user-select: none;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    position: relative;
  }
  .legend-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(64,82,182,0.14);
  }
  .legend-item.active { border-width: 2px; }
  .legend-item.dragging { opacity: 0.35; transform: scale(0.95); }
  .legend-item.drag-over { transform: translateX(4px); }

  .drag-handle { font-size: 10px; color: var(--ink-light); cursor: grab; padding: 0 1px; opacity: 0; transition: opacity 0.15s; line-height: 1; flex-shrink: 0; }
  .legend-item:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }

  .legend-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 10px; }
  .legend-name { font-size: 12px; font-weight: 600; white-space: nowrap; color: var(--ink-2); }

  .legend-add {
    background: rgba(255, 255, 255, 0.7);
    border: 1.5px dashed var(--border);
    border-radius: 99px;
    padding: 5px 14px;
    cursor: pointer;
    font-size: 12px;
    color: var(--ink-light);
    transition: all 0.18s;
  }
  .legend-add:hover { border-color: var(--primary); color: var(--primary); background: rgba(64,82,182,0.04); }

  /* ── MODE INDICATOR ──────────────────────────────────────── */
  .mode-indicator { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; min-height: 26px; }

  .mode-badge {
    display: flex; align-items: center; gap: 6px;
    background: rgba(255, 255, 255, 0.8);
    backdrop-filter: blur(8px);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 14px;
    font-size: 11px;
    color: var(--ink-light);
    transition: all 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  }
  .mode-badge.has-selection { border-color: transparent; color: #fff; }
  .mode-badge-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.4; }
  .mode-badge.has-selection .mode-badge-dot { opacity: 1; background: rgba(255,255,255,0.65); }

  /* ── GLASS PANEL ─────────────────────────────────────────── */
  .glass-panel {
    background: rgba(255, 255, 255, 0.68);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.85);
    box-shadow:
      0 8px 32px rgba(64, 82, 182, 0.09),
      0 1px 4px rgba(0,0,0,0.04),
      inset 0 1px 0 rgba(255,255,255,0.6);
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .blur-circle-1 {
    position: absolute;
    top: -80px; right: -80px;
    width: 220px; height: 220px;
    background: rgba(64, 82, 182, 0.07);
    border-radius: 50%;
    filter: blur(48px);
    pointer-events: none;
    z-index: 0;
  }
  .blur-circle-2 {
    position: absolute;
    bottom: -60px; left: -60px;
    width: 180px; height: 180px;
    background: rgba(100, 60, 200, 0.05);
    border-radius: 50%;
    filter: blur(36px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── CALENDAR ────────────────────────────────────────────── */
  .calendar {
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  .dow-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    background: rgba(239, 240, 247, 0.8);
    border-bottom: 1px solid rgba(230, 232, 239, 0.6);
  }

  .dow-cell {
    text-align: center;
    padding: 13px 0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.2px;
    color: var(--ink-light);
    text-transform: uppercase;
    font-family: 'Manrope', sans-serif;
  }
  .dow-cell:first-child { color: #e11d48; }
  .dow-cell:last-child { color: var(--primary); }

  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); }

  .day-cell {
    min-height: 90px;
    border-right: 1px solid rgba(230, 232, 239, 0.5);
    border-bottom: 1px solid rgba(230, 232, 239, 0.5);
    padding: 7px;
    cursor: pointer;
    transition: background 0.14s;
    position: relative;
    display: flex;
    flex-direction: column;
    background: rgba(255, 255, 255, 0.65);
  }
  .day-cell:nth-child(7n) { border-right: none; }
  .day-cell:hover { background: rgba(235, 237, 255, 0.75); }
  .day-cell.other-month { opacity: 0.22; pointer-events: none; }
  .day-cell.today .day-num {
    background: var(--primary);
    color: #fff !important;
    border-radius: 50%;
    box-shadow: 0 2px 10px rgba(64,82,182,0.45);
  }
  .day-cell.sun .day-num { color: #e11d48; }
  .day-cell.sat .day-num { color: var(--primary); }

  .day-num {
    font-size: 12px;
    font-weight: 700;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    border-radius: 50%;
    transition: all 0.15s;
    margin-bottom: 4px;
    letter-spacing: -0.3px;
    color: var(--ink-2);
    font-family: 'Manrope', sans-serif;
  }

  /* ── STAMPS ──────────────────────────────────────────────── */
  .stamps { display: flex; flex-wrap: wrap; gap: 2px; flex: 1; align-content: flex-start; }

  .stamp {
    width: 28px; height: 28px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
    animation: stampIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .stamp:hover { transform: scale(1.2); opacity: 0.8; }

  @keyframes stampIn {
    from { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    to { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* ── STATS ───────────────────────────────────────────────── */
  .stats { display: flex; gap: 12px; margin-top: 4px; flex-wrap: wrap; }

  .stat-card {
    background: rgba(255, 255, 255, 0.82);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.9);
    border-radius: 20px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 4px 16px rgba(64, 82, 182, 0.08), 0 1px 4px rgba(0,0,0,0.04);
    flex: 1;
    min-width: 150px;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .stat-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(64, 82, 182, 0.14);
  }

  .stat-icon {
    width: 46px; height: 46px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .stat-info { flex: 1; min-width: 0; }
  .stat-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
  .stat-label { font-size: 12px; color: var(--ink-2); font-weight: 600; font-family: 'Manrope', sans-serif; }
  .stat-count { font-family: 'Manrope', sans-serif; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .stat-bar-bg { height: 6px; background: var(--surface-low); border-radius: 99px; overflow: hidden; }
  .stat-bar-fill { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }

  /* ── FAB ─────────────────────────────────────────────────── */
  .fab {
    position: fixed;
    bottom: 28px; right: 28px;
    width: 60px; height: 60px;
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dim) 100%);
    color: #fff;
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 8px 28px rgba(64, 82, 182, 0.40);
    z-index: 40;
    transition: transform 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }
  .fab::before {
    content: '';
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.12);
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: 50%;
  }
  .fab:hover { transform: scale(1.1); box-shadow: 0 12px 36px rgba(64, 82, 182, 0.5); }
  .fab:hover::before { opacity: 1; }
  .fab:active { transform: scale(0.95); }

  /* ── MODAL ───────────────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(44,47,51,0.38);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 24px;
    padding: 28px;
    width: 320px;
    box-shadow: 0 24px 64px rgba(64,82,182,0.16), 0 4px 16px rgba(0,0,0,0.06);
    animation: modalIn 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 1px solid rgba(230,232,239,0.8);
  }
  @keyframes modalIn {
    from { transform: scale(0.9) translateY(16px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  .modal h3 {
    font-family: 'Manrope', sans-serif;
    font-size: 18px;
    font-weight: 800;
    margin-bottom: 20px;
    color: var(--ink);
    letter-spacing: -0.3px;
  }

  .modal input[type="text"] {
    width: 100%;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 11px 14px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    background: var(--surface-low);
    color: var(--ink);
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .modal input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(64,82,182,0.1);
  }

  .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 7px; margin-bottom: 16px; }

  .color-opt {
    width: 34px; height: 34px;
    border-radius: 9px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.1s, border-color 0.1s, box-shadow 0.1s;
  }
  .color-opt:hover { transform: scale(1.1); }
  .color-opt.selected { border-color: var(--ink); transform: scale(1.12); box-shadow: 0 3px 10px rgba(0,0,0,0.2); }

  .emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 16px; }

  .emoji-opt {
    width: 34px; height: 34px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: all 0.1s;
    background: var(--surface-low);
  }
  .emoji-opt:hover { background: rgba(64,82,182,0.08); transform: scale(1.1); }
  .emoji-opt.selected { border-color: var(--primary); background: var(--primary); }

  .modal-label {
    font-size: 10px;
    color: var(--ink-light);
    margin-bottom: 8px;
    letter-spacing: 0.8px;
    font-weight: 700;
    text-transform: uppercase;
    font-family: 'Manrope', sans-serif;
  }
  .modal-btns { display: flex; gap: 7px; margin-top: 6px; }

  .btn-cancel {
    flex: 1; padding: 11px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    background: var(--surface-low);
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 13px; cursor: pointer;
    color: var(--ink-2);
    transition: background 0.15s;
  }
  .btn-cancel:hover { background: var(--border); }

  .btn-confirm {
    flex: 1; padding: 11px; border: none;
    border-radius: 12px;
    background: var(--primary);
    color: #fff;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 13px; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 4px 14px rgba(64,82,182,0.32);
  }
  .btn-confirm:hover { opacity: 0.87; }
  .btn-confirm:active { transform: scale(0.98); }

  /* ── TOAST ───────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: #fff;
    padding: 11px 22px;
    border-radius: 30px;
    font-size: 12px;
    z-index: 200;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    white-space: nowrap;
    box-shadow: 0 8px 24px rgba(0,0,0,0.22);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 500px) {
    body { padding: 84px 14px 80px; }
    .day-cell { min-height: 62px; }
    .stamp { width: 22px; height: 22px; font-size: 13px; }
    .month-title { font-size: 22px; }
    .stat-card { min-width: 120px; }
    .fab { bottom: 20px; right: 20px; width: 52px; height: 52px; }
    .glass-nav { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- ── 글래스 네비게이션 바 ─────────────────────────────────── -->
<nav class="glass-nav">
  <div class="nav-brand">
    <div class="nav-brand-icon">🗓️</div>
    루틴 대시보드
  </div>
  <div class="nav-right">
    <div id="userInfo" style="display:none;align-items:center;gap:8px;">
      <div id="userAvatarEl" style="width:34px;height:34px;border-radius:50%;overflow:hidden;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--primary);color:#fff;font-size:13px;font-weight:700;"></div>
      <button id="logoutBtn" style="background:transparent;border:1px solid var(--border);border-radius:12px;padding:5px 12px;font-size:12px;color:var(--ink-light);cursor:pointer;font-family:'Gowun Dodum',sans-serif;transition:all 0.15s;">로그아웃</button>
    </div>
  </div>
</nav>

<!-- ── 로그인 화면 ─────────────────────────────────────────── -->
<div id="loginScreen" style="position:fixed;inset:0;background:linear-gradient(135deg,#f5f6fc 0%,#eef0ff 100%);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;">
  <div style="display:flex;flex-direction:column;align-items:center;gap:24px;max-width:300px;width:100%;">
    <div style="width:76px;height:76px;background:linear-gradient(135deg,#4052b6,#3346a9);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 10px 36px rgba(64,82,182,0.38);">🗓️</div>
    <div style="text-align:center;">
      <div style="font-family:'Manrope',sans-serif;font-size:28px;font-weight:800;letter-spacing:-1px;color:#2c2f33;margin-bottom:10px;">루틴 대시보드</div>
      <div style="font-size:13px;color:#595b61;line-height:1.8;">나만의 루틴을 기록하고<br>꾸준히 달성해보세요</div>
    </div>
    <button id="googleLoginBtn" style="display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(255,255,255,0.88);backdrop-filter:blur(16px);border:1.5px solid #e6e8ef;border-radius:16px;padding:14px 24px;font-size:14px;cursor:pointer;box-shadow:0 4px 18px rgba(64,82,182,0.12);font-family:'Gowun Dodum',sans-serif;color:#2c2f33;transition:all 0.18s;width:100%;">
      <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google로 시작하기
    </button>
  </div>
</div>

<!-- ── 앱 본문 ────────────────────────────────────────────── -->
<div class="header">
  <div class="month-nav">
    <button class="nav-btn" id="prevBtn">
      <span class="material-symbols-outlined" style="font-size:20px;">chevron_left</span>
    </button>
    <span class="month-title" id="monthTitle"></span>
    <button class="nav-btn" id="nextBtn">
      <span class="material-symbols-outlined" style="font-size:20px;">chevron_right</span>
    </button>
  </div>
  <button class="today-btn" id="todayBtn">오늘</button>
</div>

<div class="legend" id="legend"></div>

<div class="mode-indicator">
  <div class="mode-badge" id="modeBadge">
    <div class="mode-badge-dot"></div>
    <span id="modeText">루틴을 선택해서 날짜에 도장 찍기</span>
  </div>
</div>

<!-- 글래스 패널 캘린더 -->
<div class="glass-panel" style="padding:0;">
  <div class="blur-circle-1"></div>
  <div class="blur-circle-2"></div>
  <div class="calendar">
    <div class="dow-header">
      <div class="dow-cell">일</div>
      <div class="dow-cell">월</div>
      <div class="dow-cell">화</div>
      <div class="dow-cell">수</div>
      <div class="dow-cell">목</div>
      <div class="dow-cell">금</div>
      <div class="dow-cell">토</div>
    </div>
    <div class="days-grid" id="daysGrid"></div>
  </div>
</div>

<div class="stats" id="stats"></div>

<!-- Add Routine Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <h3>새 루틴 추가</h3>
    <div class="modal-label">루틴 이름</div>
    <input type="text" id="routineName" placeholder="예: 독서, 물 2L 마시기..." maxlength="12">
    <div class="modal-label">색상</div>
    <div class="color-grid" id="colorGrid"></div>
    <div class="modal-label">아이콘</div>
    <div class="emoji-grid" id="emojiGrid"></div>
    <div class="modal-label">루틴 주기</div>
    <div class="schedule-grid" id="scheduleGrid" style="display:flex;gap:8px;margin-bottom:14px;"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="cancelAdd">취소</button>
      <button class="btn-confirm" id="confirmAdd">추가하기</button>
    </div>
  </div>
</div>

<!-- Edit Routine Modal -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <h3>루틴 수정</h3>
    <div class="modal-label">루틴 이름</div>
    <input type="text" id="editRoutineName" placeholder="루틴 이름" maxlength="12">
    <div class="modal-label">색상</div>
    <div class="color-grid" id="editColorGrid"></div>
    <div class="modal-label">아이콘</div>
    <div class="emoji-grid" id="editEmojiGrid"></div>
    <div class="modal-label">루틴 주기</div>
    <div class="schedule-grid" id="editScheduleGrid" style="display:flex;gap:8px;margin-bottom:14px;"></div>
    <div class="modal-btns">
      <button class="btn-cancel" id="deleteRoutineBtn" style="color:#e8524a;border-color:#e8524a;">🗑 삭제</button>
      <button class="btn-cancel" id="cancelEdit">취소</button>
      <button class="btn-confirm" id="confirmEdit">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FAB -->
<button class="fab" id="fabBtn" title="루틴 추가">
  <span class="material-symbols-outlined" style="font-size:28px;line-height:1;">add</span>
</button>

<!-- Loading Overlay -->
<div id="loadingOverlay" style="display:none;position:fixed;inset:0;background:rgba(245,246,252,0.88);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:300;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
  <div style="font-size:36px;animation:spin 1s linear infinite;">🌀</div>
  <div style="font-family:'Gowun Dodum',sans-serif;font-size:14px;color:#595b61;">데이터 불러오는 중...</div>
</div>
<style>@keyframes spin { to { transform: rotate(360deg); } }</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  // ── SUPABASE CLIENT ───────────────────────────────────────────
  const SUPABASE_URL = 'https://yqyhzutkjbzyrectzjda.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_gSvAnDZjzT5GRby96sKogw_HMijUYCd';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let currentUserId = null;
  let currentSession = null;

  // ── AUTH ──────────────────────────────────────────────────────
  const isLocal = location.hostname === 'localhost' || location.hostname === '127.0.0.1';

  // 로컬 개발용 바이패스
  if (isLocal) {
    currentUserId = 'misong';
    document.getElementById('loginScreen').style.display = 'none';
    load();
  }

  sb.auth.onAuthStateChange(async (event, session) => {
    // 토큰 갱신 등 불필요한 이벤트 무시
    if (event !== 'SIGNED_IN' && event !== 'SIGNED_OUT' && event !== 'INITIAL_SESSION') return;

    if (session) {
      currentSession = session; // 세션 저장 (auth 헤더에서 직접 사용)
      // 이미 같은 유저로 로드된 경우 재로드 생략
      if (currentUserId === session.user.id) return;
      currentUserId = session.user.id;
      updateUserUI(session.user);
      document.getElementById('loginScreen').style.display = 'none';
      await load();
    } else {
      currentSession = null;
      if (isLocal) return;
      currentUserId = null;
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('userInfo').style.display = 'none';
    }
  });

  document.getElementById('googleLoginBtn').addEventListener('click', () => {
    sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.href }
    });
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut();
  });

  function updateUserUI(user) {
    const info = document.getElementById('userInfo');
    const avatar = document.getElementById('userAvatarEl');
    info.style.display = 'flex';
    const avatarUrl = user.user_metadata?.avatar_url;
    if (avatarUrl) {
      avatar.innerHTML = `<img src="${avatarUrl}" style="width:100%;height:100%;object-fit:cover;" referrerpolicy="no-referrer">`;
    } else {
      const name = user.user_metadata?.full_name || user.email || '?';
      avatar.textContent = name[0].toUpperCase();
    }
  }

  // ── DB ────────────────────────────────────────────────────────
  function getAuthHeaders() {
    return {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${currentSession ? currentSession.access_token : SUPABASE_ANON_KEY}`,
      'Content-Type': 'application/json',
    };
  }

  async function dbGet() {
    if (!currentUserId) return null;
    try {
      const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 5000));
      const fetchData = (async () => {
        const headers = getAuthHeaders();
        const res = await fetch(
          `${SUPABASE_URL}/rest/v1/routine_data?user_id=eq.${encodeURIComponent(currentUserId)}&select=*&limit=1`,
          { headers }
        );
        if (!res.ok) return null;
        const arr = await res.json();
        return Array.isArray(arr) && arr.length > 0 ? arr[0] : null;
      })();
      return await Promise.race([fetchData, timeout]);
    } catch(e) { return null; }
  }

  async function dbSave(routines, stamps) {
    if (!currentUserId) return;
    try {
      const headers = getAuthHeaders();
      const res = await fetch(`${SUPABASE_URL}/rest/v1/routine_data`, {
        method: 'POST',
        headers: { ...headers, 'Prefer': 'resolution=merge-duplicates,return=minimal' },
        body: JSON.stringify({ user_id: currentUserId, routines, stamps, updated_at: new Date().toISOString() }),
      });
      if (!res.ok) showToast('저장 실패 — 잠시 후 다시 시도해주세요.');
    } catch(e) { showToast('저장 실패 — 네트워크를 확인해주세요.'); }
  }

  // ── STATE ──────────────────────────────────────────────────────
  const DEFAULT_ROUTINES = [
    { id: 'r1', name: '아이 숙제', color: '#e8524a', emoji: '📚', schedule: 'weekday' },
    { id: 'r2', name: '헬스장', color: '#4a9e6b', emoji: '💪', schedule: 'all' },
    { id: 'r3', name: '모닝루틴', color: '#4a7fc1', emoji: '🌅', schedule: 'all' },
  ];

  let state = {
    routines: DEFAULT_ROUTINES.map(r => ({ ...r })),
    stamps: {},
    viewYear: new Date().getFullYear(),
    viewMonth: new Date().getMonth(),
    selectedRoutine: null,
  };

  // 저장 (디바운스 300ms)
  let saveTimer = null;
  function save() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => dbSave(state.routines, state.stamps), 300);
  }

  // 로딩 오버레이
  function showLoading(on) {
    document.getElementById('loadingOverlay').style.display = on ? 'flex' : 'none';
  }

  let loadInProgress = false;
  async function load() {
    if (loadInProgress) return;
    loadInProgress = true;
    showLoading(true);
    try {
      const row = await dbGet();
      if (row) {
        state.routines = (row.routines || state.routines).map(normalizeRoutine);
        state.stamps = row.stamps || {};
      } else {
        // 새 유저: 기본 루틴으로 시작
        state.routines = DEFAULT_ROUTINES.map(r => ({ ...r }));
        state.stamps = {};
      }
    } finally {
      loadInProgress = false;
      showLoading(false);
      render();
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── HELPERS ───────────────────────────────────────────────────
  const MONTHS_KO = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  function dateKey(y, m, d) {
    return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  }

  function today() {
    const t = new Date();
    return { y: t.getFullYear(), m: t.getMonth(), d: t.getDate() };
  }

  function routineById(id) { return state.routines.find(r => r.id === id); }

  function normalizeRoutine(routine) {
    if (!routine.schedule) routine.schedule = 'all';
    return routine;
  }

  function scheduleLabel(schedule) {
    if (schedule === 'weekday') return '평일';
    if (schedule === 'weekend') return '주말';
    if (schedule === 'weekly') return '주 1회';
    return '매일';
  }

  function countTargetDays(year, month, schedule) {
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    if (schedule === 'weekly') {
      // 해당 월에 걸쳐있는 주(週) 수
      const firstDow = new Date(year, month, 1).getDay();
      return Math.ceil((firstDow + daysInMonth) / 7);
    }
    let count = 0;
    for (let d = 1; d <= daysInMonth; d++) {
      const dow = new Date(year, month, d).getDay();
      if (schedule === 'weekday' && dow >= 1 && dow <= 5) count++;
      else if (schedule === 'weekend' && (dow === 0 || dow === 6)) count++;
      else if (schedule === 'all') count++;
    }
    return count;
  }

  let dragSrcId = null;

  // ── RENDER ────────────────────────────────────────────────────
  function render() {
    renderHeader();
    renderLegend();
    renderModeIndicator();
    renderCalendar();
    renderStats();
  }

  function renderHeader() {
    document.getElementById('monthTitle').textContent =
      `${state.viewYear}년 ${MONTHS_KO[state.viewMonth]}`;
  }

  function renderLegend() {
    const el = document.getElementById('legend');
    el.innerHTML = '';
    state.routines.forEach((r, idx) => {
      const item = document.createElement('div');
      item.className = 'legend-item' + (state.selectedRoutine === r.id ? ' active' : '');
      item.style.borderColor = state.selectedRoutine === r.id ? r.color : '';
      item.draggable = true;
      item.dataset.id = r.id;

      // 드래그 핸들
      const handle = document.createElement('span');
      handle.className = 'drag-handle';
      handle.textContent = '⠿';
      handle.title = '드래그해서 순서 변경';
      handle.addEventListener('mousedown', (e) => e.stopPropagation());
      item.appendChild(handle);

      const dot = document.createElement('div');
      dot.className = 'legend-dot';
      dot.style.background = r.color;
      dot.textContent = r.emoji;
      item.appendChild(dot);

      const name = document.createElement('span');
      name.className = 'legend-name';
      name.textContent = r.name;
      item.appendChild(name);

      item.addEventListener('click', () => toggleSelect(r.id, r.color));

      const editBtn = document.createElement('span');
      editBtn.textContent = '✏️';
      editBtn.title = '루틴 수정';
      editBtn.style.cssText = 'font-size:11px;opacity:0;transition:opacity 0.15s;margin-left:2px;cursor:pointer;line-height:1;';
      editBtn.addEventListener('click', (e) => { e.stopPropagation(); openEditModal(r.id); });
      item.appendChild(editBtn);
      item.addEventListener('mouseenter', () => { editBtn.style.opacity = '1'; });
      item.addEventListener('mouseleave', () => { editBtn.style.opacity = '0'; });

      // ── 드래그 이벤트 ──
      item.addEventListener('dragstart', (e) => {
        dragSrcId = r.id;
        item.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
      });
      item.addEventListener('dragend', () => {
        item.classList.remove('dragging');
        document.querySelectorAll('.legend-item').forEach(el => el.classList.remove('drag-over'));
      });
      item.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (dragSrcId !== r.id) item.classList.add('drag-over');
      });
      item.addEventListener('dragleave', () => {
        item.classList.remove('drag-over');
      });
      item.addEventListener('drop', (e) => {
        e.preventDefault();
        item.classList.remove('drag-over');
        if (dragSrcId && dragSrcId !== r.id) {
          const fromIdx = state.routines.findIndex(x => x.id === dragSrcId);
          const toIdx = state.routines.findIndex(x => x.id === r.id);
          if (fromIdx !== -1 && toIdx !== -1) {
            const moved = state.routines.splice(fromIdx, 1)[0];
            state.routines.splice(toIdx, 0, moved);
            save();
            render();
            showToast('순서가 변경됐어요!');
          }
        }
        dragSrcId = null;
      });

      el.appendChild(item);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'legend-add';
    addBtn.textContent = '+ 루틴 추가';
    addBtn.addEventListener('click', openAddModal);
    el.appendChild(addBtn);
  }

  function renderModeIndicator() {
    const badge = document.getElementById('modeBadge');
    const text = document.getElementById('modeText');
    if (state.selectedRoutine) {
      const r = routineById(state.selectedRoutine);
      badge.classList.add('has-selection');
      badge.style.setProperty('--selected-color', r.color);
      badge.style.background = r.color;
      badge.style.borderColor = r.color;
      text.textContent = `${r.emoji} ${r.name} — 날짜 클릭으로 도장 찍기`;
    } else {
      badge.classList.remove('has-selection');
      badge.style.background = '';
      badge.style.borderColor = '';
      text.textContent = '루틴을 선택해서 날짜에 도장 찍기';
    }
  }

  function renderCalendar() {
    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';
    const { viewYear: y, viewMonth: m } = state;
    const t = today();

    const firstDay = new Date(y, m, 1).getDay();
    const daysInMonth = new Date(y, m + 1, 0).getDate();
    const daysInPrev = new Date(y, m, 0).getDate();

    const cells = [];
    // prev month padding
    for (let i = firstDay - 1; i >= 0; i--) {
      cells.push({ d: daysInPrev - i, cur: false, prev: true });
    }
    // current month
    for (let d = 1; d <= daysInMonth; d++) {
      cells.push({ d, cur: true });
    }
    // next month padding
    const remaining = 42 - cells.length;
    for (let d = 1; d <= remaining; d++) {
      cells.push({ d, cur: false, next: true });
    }

    cells.forEach((cell, idx) => {
      const div = document.createElement('div');
      div.className = 'day-cell';

      const dow = idx % 7;
      if (dow === 0) div.classList.add('sun');
      if (dow === 6) div.classList.add('sat');
      if (!cell.cur) div.classList.add('other-month');

      let cy = y, cm = m;
      if (cell.prev) { cy = m === 0 ? y-1 : y; cm = m === 0 ? 11 : m-1; }
      if (cell.next) { cy = m === 11 ? y+1 : y; cm = m === 11 ? 0 : m+1; }

      const isToday = cell.cur && cy === t.y && cm === t.m && cell.d === t.d;
      if (isToday) div.classList.add('today');

      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = cell.d;
      div.appendChild(numEl);

      const stampsDiv = document.createElement('div');
      stampsDiv.className = 'stamps';
      const key = dateKey(cy, cm, cell.d);
      const dayStamps = (state.stamps[key] || []).slice().sort((a, b) => {
        const ai = state.routines.findIndex(r => r.id === a);
        const bi = state.routines.findIndex(r => r.id === b);
        return ai - bi;
      });
      dayStamps.forEach(rid => {
        const r = routineById(rid);
        if (!r) return;
        const s = document.createElement('div');
        s.className = 'stamp';
        s.style.background = r.color + '33';
        s.style.border = `1.5px solid ${r.color}`;
        s.title = r.name;
        s.textContent = r.emoji;
        s.addEventListener('click', (e) => {
          e.stopPropagation();
          removeStamp(key, rid);
        });
        stampsDiv.appendChild(s);
      });
      div.appendChild(stampsDiv);

      div.addEventListener('click', () => {
        if (state.selectedRoutine) addStamp(key, state.selectedRoutine);
      });

      grid.appendChild(div);
    });
  }

  function renderStats() {
    const el = document.getElementById('stats');
    el.innerHTML = '';
    const { viewYear: y, viewMonth: m } = state;
    const prefix = `${y}-${String(m+1).padStart(2,'0')}-`;

    state.routines.forEach(r => {
      let count = 0;
      Object.entries(state.stamps).forEach(([k, ids]) => {
        if (k.startsWith(prefix) && ids.includes(r.id)) count++;
      });
      const goal = countTargetDays(y, m, r.schedule || 'all');
      const pct = goal > 0 ? Math.min(100, Math.round((count / goal) * 100)) : 0;
      const card = document.createElement('div');
      card.className = 'stat-card';
      card.innerHTML = `
        <div class="stat-icon" style="background:${r.color}20">${escapeHtml(r.emoji)}</div>
        <div class="stat-info">
          <div class="stat-top">
            <span class="stat-label">${escapeHtml(r.name)}</span>
            <span class="stat-count" style="color:${r.color}">${count}<span style="font-size:11px;color:var(--ink-light);font-family:'Gowun Dodum'">/${goal}일</span></span>
          </div>
          <div class="stat-bar-bg">
            <div class="stat-bar-fill" style="width:${pct}%;background:linear-gradient(90deg,${r.color}cc,${r.color})"></div>
          </div>
        </div>
      `;
      el.appendChild(card);
    });
  }

  // ── ACTIONS ───────────────────────────────────────────────────
  function toggleSelect(id, color) {
    state.selectedRoutine = state.selectedRoutine === id ? null : id;
    render();
  }

  function addStamp(key, rid) {
    if (!state.stamps[key]) state.stamps[key] = [];
    if (state.stamps[key].includes(rid)) {
      showToast('이미 찍혀있어요! 도장을 클릭하면 지워져요.');
      return;
    }
    state.stamps[key].push(rid);
    save();
    render();
  }

  function removeStamp(key, rid) {
    if (!state.stamps[key]) return;
    state.stamps[key] = state.stamps[key].filter(r => r !== rid);
    if (!state.stamps[key].length) delete state.stamps[key];
    save();
    render();
    showToast('도장을 지웠어요.');
  }

  // ── MODAL ─────────────────────────────────────────────────────
  const PRESET_COLORS = [
    '#e8524a','#e8804a','#d4b84a','#4a9e6b','#4a7fc1','#7c5cbf',
    '#e84a8a','#4ab8c8','#8eb84a','#c1844a','#4a4a8a','#7a7a7a',
  ];
  const PRESET_EMOJIS = ['👦','👧','🦄','🌍','📚','💪','🌅','🏃','🥗','💊','🧘','✍️','🎯','💧','😴','🎵','📖','🛁','🍎','🧹'];
  const SCHEDULE_OPTIONS = [
    { value: 'all', label: '매일'},
    { value: 'weekday', label: '평일'},
    { value: 'weekend', label: '주말'},
    { value: 'weekly', label: '주 1회'},
  ];

  let pendingColor = PRESET_COLORS[0];
  let pendingEmoji = PRESET_EMOJIS[0];
  let pendingSchedule = 'all';

  let editColor = PRESET_COLORS[0];
  let editEmoji = PRESET_EMOJIS[0];
  let editSchedule = 'all';

  function openAddModal() {
    pendingColor = PRESET_COLORS[0];
    pendingEmoji = PRESET_EMOJIS[0];
    pendingSchedule = 'all';
    document.getElementById('routineName').value = '';
    renderColorGrid();
    renderEmojiGrid();
    renderScheduleGrid();
    document.getElementById('addModal').classList.add('open');
    setTimeout(() => document.getElementById('routineName').focus(), 100);
  }

  function renderColorGrid() {
    const g = document.getElementById('colorGrid');
    g.innerHTML = '';
    PRESET_COLORS.forEach(c => {
      const btn = document.createElement('div');
      btn.className = 'color-opt' + (c === pendingColor ? ' selected' : '');
      btn.style.background = c;
      btn.addEventListener('click', () => { pendingColor = c; renderColorGrid(); });
      g.appendChild(btn);
    });
  }

  function renderEmojiGrid() {
    const g = document.getElementById('emojiGrid');
    g.innerHTML = '';
    PRESET_EMOJIS.forEach(e => {
      const btn = document.createElement('div');
      btn.className = 'emoji-opt' + (e === pendingEmoji ? ' selected' : '');
      btn.textContent = e;
      btn.addEventListener('click', () => { pendingEmoji = e; renderEmojiGrid(); });
      g.appendChild(btn);
    });
  }

  function makeScheduleBtn(opt, isSelected) {
    const btn = document.createElement('div');
    btn.className = 'color-opt' + (isSelected ? ' selected' : '');
    btn.style.cssText = `
      width:auto; height:34px; padding:0 12px; white-space:nowrap;
      background:${opt.value === 'weekday' ? '#4a9e6b' : opt.value === 'weekend' ? '#4a7fc1' : opt.value === 'weekly' ? '#7c5cbf' : '#e8524a'};
      color:#fff; display:flex; align-items:center; justify-content:center; font-size:12px;
    `;
    btn.textContent = opt.label;
    return btn;
  }

  function renderScheduleGrid() {
    const g = document.getElementById('scheduleGrid');
    g.innerHTML = '';
    SCHEDULE_OPTIONS.forEach(opt => {
      const btn = makeScheduleBtn(opt, opt.value === pendingSchedule);
      btn.addEventListener('click', () => { pendingSchedule = opt.value; renderScheduleGrid(); });
      g.appendChild(btn);
    });
  }

  function renderEditScheduleGrid() {
    const g = document.getElementById('editScheduleGrid');
    g.innerHTML = '';
    SCHEDULE_OPTIONS.forEach(opt => {
      const btn = makeScheduleBtn(opt, opt.value === editSchedule);
      btn.addEventListener('click', () => { editSchedule = opt.value; renderEditScheduleGrid(); });
      g.appendChild(btn);
    });
  }

  document.getElementById('cancelAdd').addEventListener('click', () => {
    document.getElementById('addModal').classList.remove('open');
  });

  document.getElementById('addModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('addModal'))
      document.getElementById('addModal').classList.remove('open');
  });

  document.getElementById('confirmAdd').addEventListener('click', () => {
    const name = document.getElementById('routineName').value.trim();
    if (!name) { showToast('루틴 이름을 입력해주세요.'); return; }
    state.routines.push({
      id: 'r' + Date.now(),
      name,
      color: pendingColor,
      emoji: pendingEmoji,
      schedule: pendingSchedule || 'all',
    });
    save();
    document.getElementById('addModal').classList.remove('open');
    render();
    showToast(`"${name}" 루틴이 추가됐어요!`);
  });

  // ── EDIT MODAL ────────────────────────────────────────────────
  let editingId = null;

  function openEditModal(id) {
    const r = routineById(id);
    if (!r) return;
    editingId = id;
    editColor = r.color;
    editEmoji = r.emoji;
    editSchedule = r.schedule || 'all';
    document.getElementById('editRoutineName').value = r.name;
    renderEditColorGrid();
    renderEditEmojiGrid();
    renderEditScheduleGrid();
    document.getElementById('editModal').classList.add('open');
    setTimeout(() => document.getElementById('editRoutineName').focus(), 100);
  }

  function renderEditColorGrid() {
    const g = document.getElementById('editColorGrid');
    g.innerHTML = '';
    PRESET_COLORS.forEach(c => {
      const btn = document.createElement('div');
      btn.className = 'color-opt' + (c === editColor ? ' selected' : '');
      btn.style.background = c;
      btn.addEventListener('click', () => { editColor = c; renderEditColorGrid(); });
      g.appendChild(btn);
    });
  }

  function renderEditEmojiGrid() {
    const g = document.getElementById('editEmojiGrid');
    g.innerHTML = '';
    PRESET_EMOJIS.forEach(e => {
      const btn = document.createElement('div');
      btn.className = 'emoji-opt' + (e === editEmoji ? ' selected' : '');
      btn.textContent = e;
      btn.addEventListener('click', () => { editEmoji = e; renderEditEmojiGrid(); });
      g.appendChild(btn);
    });
  }

  document.getElementById('cancelEdit').addEventListener('click', () => {
    document.getElementById('editModal').classList.remove('open');
  });

  document.getElementById('editModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('editModal'))
      document.getElementById('editModal').classList.remove('open');
  });

  document.getElementById('confirmEdit').addEventListener('click', () => {
    const name = document.getElementById('editRoutineName').value.trim();
    if (!name) { showToast('루틴 이름을 입력해주세요.'); return; }
    const r = routineById(editingId);
    if (!r) return;
    r.name = name;
    r.color = editColor;
    r.emoji = editEmoji;
    r.schedule = editSchedule || 'all';
    save();
    document.getElementById('editModal').classList.remove('open');
    render();
    showToast(`"${name}"으로 수정됐어요!`);
  });

  document.getElementById('deleteRoutineBtn').addEventListener('click', () => {
    const r = routineById(editingId);
    if (!r) return;
    if (!confirm(`"${r.name}" 루틴을 삭제할까요?\n찍힌 도장 기록도 모두 사라져요.`)) return;
    // 도장 기록에서도 제거
    Object.keys(state.stamps).forEach(k => {
      state.stamps[k] = state.stamps[k].filter(id => id !== editingId);
      if (!state.stamps[k].length) delete state.stamps[k];
    });
    state.routines = state.routines.filter(r => r.id !== editingId);
    if (state.selectedRoutine === editingId) state.selectedRoutine = null;
    save();
    document.getElementById('editModal').classList.remove('open');
    render();
    showToast(`루틴이 삭제됐어요.`);
  });


  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      document.getElementById('addModal').classList.remove('open');
      document.getElementById('editModal').classList.remove('open');
    }
  });

  // ── NAV ───────────────────────────────────────────────────────
  document.getElementById('prevBtn').addEventListener('click', () => {
    if (state.viewMonth === 0) { state.viewYear--; state.viewMonth = 11; }
    else state.viewMonth--;
    render();
  });
  document.getElementById('nextBtn').addEventListener('click', () => {
    if (state.viewMonth === 11) { state.viewYear++; state.viewMonth = 0; }
    else state.viewMonth++;
    render();
  });
  document.getElementById('todayBtn').addEventListener('click', () => {
    const t = today();
    state.viewYear = t.y;
    state.viewMonth = t.m;
    render();
  });

  // ── FAB ───────────────────────────────────────────────────────
  document.getElementById('fabBtn').addEventListener('click', openAddModal);
</script>
</body>
</html>
